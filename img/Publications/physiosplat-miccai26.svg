<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10241c"/><stop offset="1" stop-color="#1c3a2c"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5aa06e"/><stop offset="1" stop-color="#9bd3a8"/>
    </linearGradient>
    <radialGradient id="tissue" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#e0728a"/><stop offset="1" stop-color="#7c2f44"/>
    </radialGradient>
  </defs>
  <rect width="480" height="360" fill="url(#bg2)"/>
  <rect x="0" y="0" width="480" height="6" fill="url(#acc2)"/>

  <!-- gaussian splat cloud -->
  <g opacity="0.9">
    <ellipse cx="150" cy="180" rx="34" ry="20" fill="url(#tissue)" opacity="0.5"/>
    <ellipse cx="178" cy="166" rx="26" ry="16" fill="url(#tissue)" opacity="0.6"/>
    <ellipse cx="135" cy="200" rx="22" ry="14" fill="url(#tissue)" opacity="0.55"/>
    <ellipse cx="196" cy="196" rx="18" ry="12" fill="url(#tissue)" opacity="0.6"/>
    <circle cx="150" cy="180" r="2.5" fill="#ffd9e0"/>
    <circle cx="178" cy="166" r="2.5" fill="#ffd9e0"/>
    <circle cx="196" cy="196" r="2" fill="#ffd9e0"/>
  </g>
  <text x="165" y="240" text-anchor="middle" font-size="11" fill="#9bd3a8">dynamic 3D Gaussians</text>

  <!-- physics constraint -->
  <path d="M236 180 L300 180" stroke="#9bd3a8" stroke-width="2.4" fill="none"/>
  <text x="268" y="166" text-anchor="middle" font-size="10" fill="#9bd3a8" font-style="italic">physics-</text>
  <text x="268" y="200" text-anchor="middle" font-size="10" fill="#9bd3a8" font-style="italic">informed</text>

  <!-- reconstructed surface (mesh grid) -->
  <g stroke="#9bd3a8" stroke-width="1" fill="none" opacity="0.85">
    <path d="M312 150 q40 -18 80 0 q-6 40 0 70 q-40 16 -80 0 q6 -38 0 -70 Z" fill="#1c3a2c"/>
    <path d="M312 168 q40 -14 80 0 M312 190 q40 -12 80 0 M332 150 q-4 40 0 70 M372 150 q4 40 0 70"/>
  </g>
  <text x="352" y="240" text-anchor="middle" font-size="11" fill="#9bd3a8">surgical scene</text>

  <text x="240" y="48" text-anchor="middle" font-size="23" font-weight="700" fill="#fff" font-family="'Space Grotesk',sans-serif">PhysioSplat</text>
  <text x="240" y="74" text-anchor="middle" font-size="12.5" fill="#cbd5e1">Physics-Informed Dynamic Gaussian Splatting</text>
  <text x="240" y="92" text-anchor="middle" font-size="12.5" fill="#cbd5e1">for Surgical Scene Reconstruction</text>
  <text x="240" y="300" text-anchor="middle" font-size="11" fill="#8fb89c">Deformable tissue modeling with physical priors for real-time endoscopic rendering</text>
  <text x="240" y="326" text-anchor="middle" font-size="13" font-weight="600" fill="#9bd3a8">MICCAI 2026</text>
</svg>
