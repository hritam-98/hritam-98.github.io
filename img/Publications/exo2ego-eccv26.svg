<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2433"/><stop offset="1" stop-color="#2a3146"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b07a37"/><stop offset="1" stop-color="#e0b15f"/>
    </linearGradient>
    <marker id="a" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e0b15f"/></marker>
  </defs>
  <rect width="480" height="360" fill="url(#bg)"/>
  <rect x="0" y="0" width="480" height="6" fill="url(#acc)"/>

  <!-- exo view -->
  <rect x="40" y="120" width="120" height="92" rx="8" fill="#2f3850" stroke="#56607a"/>
  <text x="100" y="112" text-anchor="middle" font-size="12" fill="#cbd5e1">Exocentric view</text>
  <circle cx="100" cy="166" r="26" fill="none" stroke="#9aa6c4" stroke-width="2"/>
  <circle cx="100" cy="166" r="6" fill="#e0b15f"/>
  <path d="M70 196 q30 -34 60 0" fill="none" stroke="#9aa6c4" stroke-width="2"/>

  <!-- arrow / translation -->
  <path d="M168 166 L228 166" stroke="#e0b15f" stroke-width="2.4" fill="none" marker-end="url(#a)"/>
  <text x="198" y="152" text-anchor="middle" font-size="10" fill="#e0b15f" font-style="italic">pose-aligned</text>
  <text x="198" y="188" text-anchor="middle" font-size="10" fill="#9aa6c4">cross-view</text>

  <!-- ego view -->
  <rect x="236" y="120" width="120" height="92" rx="8" fill="#2f3850" stroke="#56607a"/>
  <text x="296" y="112" text-anchor="middle" font-size="12" fill="#cbd5e1">Egocentric view</text>
  <rect x="262" y="150" width="68" height="44" rx="4" fill="none" stroke="#9aa6c4" stroke-width="2"/>
  <path d="M262 178 l22 -16 l18 12 l16 -10 l12 14" fill="none" stroke="#e0b15f" stroke-width="2"/>

  <!-- policy -->
  <path d="M364 166 L412 166" stroke="#e0b15f" stroke-width="2.4" fill="none" marker-end="url(#a)"/>
  <rect x="392" y="138" width="60" height="56" rx="8" fill="url(#acc)"/>
  <text x="422" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#1f2433">Policy</text>
  <text x="422" y="178" text-anchor="middle" font-size="10" fill="#3a2f1a">rollout</text>

  <text x="240" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#fff" font-family="'Space Grotesk',sans-serif">Exo2EgoPolicy</text>
  <text x="240" y="74" text-anchor="middle" font-size="13" fill="#cbd5e1">Pose-Aligned Cross-View Policy Learning</text>
  <text x="240" y="262" text-anchor="middle" font-size="11" fill="#9aa6c4">Exocentric-to-egocentric viewpoint translation for imitation learning</text>
  <text x="240" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#e0b15f">ECCV 2026</text>
</svg>
